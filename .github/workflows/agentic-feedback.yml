name: Agentic SDLC feedback

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: agentic-feedback-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  agentic-sdlc:
    name: Workflow, cost and evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate architecture and golden path
        run: python3 scripts/validate.py

      - name: Render dashboard and PR summary
        run: |
          python3 scripts/render_consumption_artifacts.py --dashboard /tmp/dashboard-data.json --summary /tmp/pr-summary.md
          cat /tmp/pr-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentic-sdlc-dashboard-${{ github.event.pull_request.number }}
          path: /tmp/dashboard-data.json
          retention-days: 30

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- agentic-sdlc-summary -->';
            const body = fs.readFileSync('/tmp/pr-summary.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const previous = comments.find(comment => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
